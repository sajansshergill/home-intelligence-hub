version: 2

models:
  - name: stg_referrals
    description: Cleaned referral records with acceptance flags and lag metrics.
    columns:
      - name: referral_id
        tests:
          - not_null
          - unique
      - name: patient_id
        tests:
          - not_null
      - name: payor_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ["pending", "accepted", "rejected", "cancelled"]
      - name: urgency
        tests:
          - accepted_values:
              values: ["routine", "urgent", "emergent"]

  - name: stg_authorizations
    description: Cleaned authorization records with approval flags and unit metrics.
    columns:
      - name: auth_id
        tests:
          - not_null
          - unique
      - name: referral_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ["submitted", "approved", "denied", "pending_info"]

  - name: stg_visits
    description: Cleaned visit records with completion and punctuality metrics.
    columns:
      - name: visit_id
        tests:
          - not_null
          - unique
      - name: referral_id
        tests:
          - not_null
      - name: clinician_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ["scheduled", "completed", "missed", "cancelled"]

  - name: stg_clinicians
    description: Cleaned clinician roster with capacity and tenure fields.
    columns:
      - name: clinician_id
        tests:
          - not_null
          - unique
      - name: weekly_capacity_visits
        tests:
          - not_null

  - name: int_referral_journey
    description: One row per referral joining referral, latest authorization, first visit, and payor context.
    columns:
      - name: referral_id
        tests:
          - not_null
          - unique

  - name: int_clinician_schedule
    description: Weekly clinician schedule rollup for capacity analysis.
    columns:
      - name: clinician_id
        tests:
          - not_null
      - name: scheduled_week
        tests:
          - not_null

  - name: mart_patient_referral_funnel
    description: Monthly referral funnel metrics by service type and urgency.
    columns:
      - name: referral_month
        tests:
          - not_null
      - name: total_referrals
        tests:
          - not_null

  - name: mart_payor_authorization_lag
    description: Monthly payor authorization lag, SLA, and approval metrics.
    columns:
      - name: payor_id
        tests:
          - not_null
      - name: submitted_month
        tests:
          - not_null

  - name: mart_clinician_utilization
    description: Weekly clinician utilization and capacity metrics.
    columns:
      - name: clinician_id
        tests:
          - not_null
      - name: scheduled_week
        tests:
          - not_null
